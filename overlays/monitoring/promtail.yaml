apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: promtail
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      # 1. Scrape system logs (syslog, etc.) from the node
      - job_name: system
        static_configs:
          - targets: [localhost]
            labels:
              job: varlogs
              __path__: /var/log/*.log

      # 2. Scrape Kubernetes pod logs
      - job_name: kubernetes-pods
        static_configs:
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/**/*.log
        pipeline_stages:
          # Extract metadata from the path
          # Format: /var/log/pods/<namespace>_<pod_name>_<pod_uid>/<container_name>/<restart_count>.log
          - regex:
              expression: '^/var/log/pods/(?P<namespace>[^/_\s]+)_(?P<pod_name>[^/_\s]+)_(?P<pod_uid>[^/_\s]+)/(?P<container_name>[^/_\s]+)/(?P<restart_count>\d+)\.log$'
              source: filename
          - labels:
              namespace:
              pod_name:
              container_name:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
spec:
  selector:
    matchLabels:
      name: promtail
  template:
    metadata:
      labels:
        name: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: promtail
          image: grafana/promtail:3.0.0
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: logs
              mountPath: /var/log
              readOnly: true
            - name: config
              mountPath: /etc/promtail
            - name: run
              mountPath: /run/promtail
      volumes:
        - name: logs
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: promtail-config
        - name: run
          hostPath:
            path: /run/promtail
