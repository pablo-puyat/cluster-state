image:
  tag: "3.6.13"

deployment:
  kind: Deployment
  replicas: 1
  strategy:
    type: Recreate
providers:
  kubernetesGateway:
    enabled: true
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik
ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`barista503.cbrz.app`)
    entryPoints:
      - web
gateway:
  listeners:
    web:
      namespacePolicy:
        from: All
dashboard:
  enabled: true
