image:
  tag: "3.6.13"

deployment:
  name: traefik-private
  kind: Deployment
  replicas: 1
  strategy:
    type: Recreate

service:
  enabled: true
  type: LoadBalancer
  externalTrafficPolicy: Local
  annotations:
      metallb.universe.tf/address-pool: "tailscale-ip-pool"

ports:
  websecure:
    port: 443

api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: true
    domain: callandor.tailcdecb.ts.net
    matchRule: Host(`callandor.tailcdecb.ts.net`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
    entryPoints:
      - websecure
    rules:
      - host: callandor.tailcdecb.ts.net
        http:
          paths:
            - path: /dashboard
              pathType: Prefix
  tls:
    secretName: callandor-tailscale-tls

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    ingressClass: traefik-private
    ingressEndpoint:
      publishedService: traefik-private/traefik-private

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik-private
  controller: traefik.io/private

log:
  general:
     level: DEBUG
  access: true
