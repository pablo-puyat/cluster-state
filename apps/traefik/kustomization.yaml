apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pull the core application tracking block directly from your public base
resources:
  - github.com/pablo-puyat/infrastructure//gitops/apps/traefik?ref=feat-monitoring

patches:
  - target:
      kind: Application
      name: traefik
    patch: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: traefik
        namespace: argocd
      spec:
        source:
          helm:
            values: |
              ingressRoute:
                dashboard:
                  matchRule: Host(`callandor.tailcdecb.ts.net`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
                  tls:
                    secretName: callandor-tailscale-tls
