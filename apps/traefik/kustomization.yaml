apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - github.com/pablo-puyat/infrastructure//gitops/infrastructure/traefik?ref=feat-monitoring

patches:
  - target:
      kind: Application
      name: traefik
    patch: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: traefik
        namespace: argocd
      spec:
        source:
          helm:
            values: |
              # 1. Update the main dashboard route
              ingressRoute:
                dashboard:
                  matchRule: Host(`callandor.tailcdecb.ts.net`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
                  tls:
                    secretName: callandor-tailscale-tls

              # 2. Split the services so both network interfaces can bind simultaneously
              extraServices:
                traefik-tailscale:
                  enabled: true
                  type: LoadBalancer
                  externalTrafficPolicy: Local
                  # Force MetalLB to assign your specific Tailscale IP to this service
                  annotations:
                    metallb.universe.tf/loadBalancerIPs: "100.70.15.42"
                  ports:
                    web:
                      port: 80
                    websecure:
                      port: 443
