apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1. Pull the complete core blueprint (which now contains BOTH pools upstream)
resources:
  - github.com/pablo-puyat/infrastructure//gitops/infrastructure/metallb?ref=main

patches:
  - target:
      version: v1beta1
      group: metallb.io
      kind: IPAddressPool
      name: host-ip-pool
      namespace: metallb-system
    patch: |
      - op: replace
        path: /spec/addresses
        value:
          - 138.201.240.46/32

  - target:
      version: v1beta1
      group: metallb.io
      kind: IPAddressPool
      name: tailscale-ip-pool
      namespace: metallb-system
    patch: |
      - op: replace
        path: /spec/addresses
        value:
          - 100.70.15.42/32
