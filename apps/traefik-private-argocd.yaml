apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-private
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:pablo-puyat/cluster-state.git'
    targetRevision: HEAD
    path: overlays/traefik-private
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: traefik-private
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
