apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/pablo-puyat/infrastructure.git'
    targetRevision: main
    path: gitops/infrastructure/gitea-server
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
