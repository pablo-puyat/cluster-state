apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: static-files
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:your-username/your-private-repo.git' # Private Repo
    targetRevision: HEAD
    path: overlays/static-files # Points to your local configuration layer
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: static-files # Matches the namespace in your manifests
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
