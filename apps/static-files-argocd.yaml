apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: static-files
  namespace: static-files
spec:
  project: default
  source:
    repoURL: 'git@github.com:pablo-puyat/cluster-state.git'
    targetRevision: HEAD
    path: overlays/static-files
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: static-files
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
