apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  sources: # Use 'sources' (plural) for multi-source
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 33.1.0
    - repoURL: 'git@github.com:pablo-puyat/cluster-state.git'
      targetRevision: HEAD
      path: overlays/traefik-public
  source:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  helm:
    valueFiles:
      - $values-repo/overlays/traefik-public/values.yaml
