apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 28.0.0
    directory:
      include: 'crds/*' # This tells Argo to only look at the CRD folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: traefik
